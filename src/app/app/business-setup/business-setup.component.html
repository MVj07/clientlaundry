<div class="layout">

  <!-- LEFT BRANDING SIDEBAR -->
  <div class="left-side">
    <div class="left-content w-100 px-5">
      <!-- Logo Drop Container -->
      <div class="logo-container mb-4">
        <div class="logo-circle">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22a7 7 0 0 0 5-11.97l-5-5.91-5 5.91A7 7 0 0 0 12 22z"/>
          </svg>
        </div>
      </div>
      
      <h1 class="app-title fw-bold">LaundryPro SaaS</h1>
      <p class="app-tagline text-secondary-light">Setting up your professional wash workflows.</p>

    </div>
  </div>

  <!-- RIGHT ACTION SETUP AREA -->
  <div class="right-side d-flex align-items-center justify-content-center">
    
    <div class="slider-wrapper w-100 px-5" style="max-width: 600px;">
      
      <div class="slider">
        
        <!-- BUSINESS DETAILS -->
        <div class="slide step-1">
          <h2 class="title fw-bold text-dark mb-1">Set Up Your Laundry Business</h2>
          <p class="subtitle text-secondary mb-4">Enter your shop profile information</p>

          <form [formGroup]="businessForm" class="space-y-4">
            <!-- Row 1: Name and Owner -->
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold text-secondary">Business Name *</label>
                <input formControlName="business_name" class="form-control" placeholder="e.g. Royal Dry Clean"
                       [ngClass]="{ 'is-invalid': (businesssubmit && form['business_name'].errors) || (form['business_name'].invalid && (form['business_name'].dirty || form['business_name'].touched)) }" />
                <div *ngIf="(businesssubmit && form['business_name'].errors) || (form['business_name'].invalid && (form['business_name'].dirty || form['business_name'].touched))" class="invalid-feedback">
                  <span *ngIf="form['business_name'].errors?.['required']">Business name is required</span>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold text-secondary">Owner Name *</label>
                <input formControlName="owner_name" placeholder="e.g. Ravi Kumar" class="form-control" 
                       [ngClass]="{ 'is-invalid': (businesssubmit && form['owner_name'].errors) || (form['owner_name'].invalid && (form['owner_name'].dirty || form['owner_name'].touched)) }" />
                <div *ngIf="(businesssubmit && form['owner_name'].errors) || (form['owner_name'].invalid && (form['owner_name'].dirty || form['owner_name'].touched))" class="invalid-feedback">
                  <span *ngIf="form['owner_name'].errors?.['required']">Owner name is required</span>
                </div>
              </div>
            </div>

            <!-- Row 2: Mobile and City -->
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold text-secondary">Mobile *</label>
                <input formControlName="mobile" placeholder="e.g. 9876543210" class="form-control" 
                       [ngClass]="{ 'is-invalid': (businesssubmit && form['mobile'].errors) || (form['mobile'].invalid && (form['mobile'].dirty || form['mobile'].touched)) }" />
                <div *ngIf="(businesssubmit && form['mobile'].errors) || (form['mobile'].invalid && (form['mobile'].dirty || form['mobile'].touched))" class="invalid-feedback">
                  <span *ngIf="form['mobile'].errors?.['required']">Mobile is required</span>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold text-secondary">City *</label>
                <input formControlName="city" placeholder="e.g. Madurai" class="form-control" 
                       [ngClass]="{ 'is-invalid': (businesssubmit && form['city'].errors) || (form['city'].invalid && (form['city'].dirty || form['city'].touched)) }" />
                <div *ngIf="(businesssubmit && form['city'].errors) || (form['city'].invalid && (form['city'].dirty || form['city'].touched))" class="invalid-feedback">
                  <span *ngIf="form['city'].errors?.['required']">City is required</span>
                </div>
              </div>
            </div>

            <!-- Row 3: Address -->
            <div class="mb-3">
              <label class="form-label fw-semibold text-secondary">Full Address *</label>
              <textarea formControlName="address" rows="2" placeholder="Enter complete business location address"
                        class="form-control" [ngClass]="{ 'is-invalid': (businesssubmit && form['address'].errors) || (form['address'].invalid && (form['address'].dirty || form['address'].touched)) }"></textarea>
              <div *ngIf="(businesssubmit && form['address'].errors) || (form['address'].invalid && (form['address'].dirty || form['address'].touched))" class="invalid-feedback">
                <span *ngIf="form['address'].errors?.['required']">Address is required</span>
              </div>
            </div>

            <!-- Row 4: GST and Logo -->
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label fw-semibold text-secondary">GST Number (optional)</label>
                <input formControlName="gst_no" placeholder="e.g. GST12345X9" class="form-control" />
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold text-secondary">Logo (optional)</label>
                <input type="file" (change)="onFileSelected($event)" class="form-control file-input" />
              </div>
            </div>

            <!-- Submit Button -->
            <button type="button" class="primaryBtn py-2 d-flex align-items-center justify-content-center gap-2" [disabled]="loading" (click)="submit()">
              <span *ngIf="loading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
              <span>{{ loading ? 'Saving Profile...' : 'Save & Complete Setup' }}</span>
            </button>
          </form>
        </div>

      </div>
    </div>
  </div>

</div>
