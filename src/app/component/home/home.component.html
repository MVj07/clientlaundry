<app-header></app-header>

<div class="dashboard-container">

  <!-- Header -->
  <div class="dashboard-header">
    <!-- <div>
      <h3>{{ businessName }}</h3>
      <small>{{ today | date:'fullDate' }}</small>
    </div>
    <button class="btn btn-outline-danger btn-sm">Logout</button> -->
  </div>

  <!-- KPI Cards -->
  <div class="row g-3 mt-3">
    <div class="col-md-3" *ngFor="let card of kpiCards">
      <div class="card kpi-card" [ngClass]="card.color">
        <div class="kpi-title">{{ card.title }}</div>
        <div class="kpi-value">{{ card.value }}</div>
      </div>
    </div>
  </div>

  <!-- Status Summary -->
  <div class="row g-3 mt-4">
    <div class="col-md-3" *ngFor="let status of statusSummary">
      <div class="card status-card">
        <div class="status-title">{{ status.label }}</div>
        <div class="status-count">{{ status.count }}</div>
      </div>
    </div>
  </div>

  <!-- Main Section -->
  <div class="row g-3 mt-4">

    <!-- Recent Orders -->
    <div class="col-md-8">
      <div class="card p-3">
        <h5 class="mb-3">Recent Orders</h5>

        <table class="table table-sm align-middle">
          <thead>
            <tr>
              <th>Bill No</th>
              <th>Customer</th>
              <th>Status</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let order of orders">
              <td class="text-align-center">{{ order.bill }}</td>
              <td class="text-align-center">{{ order.customerId.name }}</td>
              <td class="text-align-center">
                <span class="badge"
                  [ngClass]="{
                    'bg-primary': order.status==='washing',
                    'bg-warning': order.status==='ironing',
                    'bg-info': order.status==='packing',
                    'bg-success': order.status==='deliver'
                  }">
                  {{ order.status | titlecase }}
                </span>
              </td>
              <td class="text-align-center">₹{{ order.billAmount }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="col-md-4">
      <div class="card p-3">
        <h5 class="mb-3">Quick Actions</h5>

        <button class="btn btn-primary w-100 mb-2">➕ New Order</button>
        <button class="btn btn-success w-100 mb-2">👤 New Customer</button>
        <button class="btn btn-warning w-100 mb-2">📦 Packing</button>
        <button class="btn btn-dark w-100">📊 Expenses</button>
      </div>
    </div>

  </div>

</div>
