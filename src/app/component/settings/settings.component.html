<app-header></app-header>

<section class="py-5" style="background-color: #f8fafc; min-height: 100vh;">
  <div class="col-lg-10 offset-lg-1">

    <!-- Page Title -->
    <div class="mb-4">
      <h2 class="fw-bold text-dark m-0" style="font-family: 'Outfit', sans-serif;">Application Settings</h2>
      <p class="text-secondary small m-0">Manage security details and system items configuration.</p>
    </div>

    <!-- Grid Layout -->
    <div class="row g-4">

      <!-- Left Column: Password Management -->
      <div class="col-md-5">
        <div class="bg-white border rounded-3 p-4 shadow-sm h-100"
          style="border-color: #e2e8f0 !important; border-left: 5px solid #2563eb !important;">
          <h5 class="fw-bold text-dark mb-4" style="font-family: 'Outfit', sans-serif;">Change Password</h5>

          <form (ngSubmit)="onSubmit()" #passwordForm="ngForm" class="space-y-4">
            <div class="mb-3">
              <label class="form-label fw-semibold text-secondary">Current Password</label>
              <div class="position-relative">
                <input [type]="showCurrentPassword ? 'text' : 'password'" [(ngModel)]="passwords.currentPassword"
                  name="currentPassword" required class="form-control pe-5" placeholder="Enter current password"
                  style="border-radius: 8px; font-size: 14px; padding: 10px 14px;">
                <button type="button" class="btn position-absolute border-0 bg-transparent text-secondary"
                  style="right: 12px; top: 50%; transform: translateY(-50%); padding: 0;"
                  (click)="showCurrentPassword = !showCurrentPassword">
                  <svg *ngIf="!showCurrentPassword" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                  <svg *ngIf="showCurrentPassword" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                      d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold text-secondary">New Password</label>
              <div class="position-relative">
                <input [type]="showNewPassword ? 'text' : 'password'" [(ngModel)]="passwords.newPassword"
                  name="newPassword" required class="form-control pe-5" placeholder="Enter new password (min 6 chars)"
                  style="border-radius: 8px; font-size: 14px; padding: 10px 14px;">
                <button type="button" class="btn position-absolute border-0 bg-transparent text-secondary"
                  style="right: 12px; top: 50%; transform: translateY(-50%); padding: 0;"
                  (click)="showNewPassword = !showNewPassword">
                  <svg *ngIf="!showNewPassword" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                  <svg *ngIf="showNewPassword" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                      d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold text-secondary">Confirm New Password</label>
              <div class="position-relative">
                <input [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="passwords.confirmPassword"
                  name="confirmPassword" required class="form-control pe-5" placeholder="Confirm new password"
                  style="border-radius: 8px; font-size: 14px; padding: 10px 14px;">
                <button type="button" class="btn position-absolute border-0 bg-transparent text-secondary"
                  style="right: 12px; top: 50%; transform: translateY(-50%); padding: 0;"
                  (click)="showConfirmPassword = !showConfirmPassword">
                  <svg *ngIf="!showConfirmPassword" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                  <svg *ngIf="showConfirmPassword" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                      d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                  </svg>
                </button>
              </div>
            </div>

            <!-- Messages -->
            <div *ngIf="error" class="alert alert-danger py-2 px-3 small border-0 mb-3" style="border-radius: 8px;">
              ⚠️ {{ error }}
            </div>

            <div *ngIf="success" class="alert alert-success py-2 px-3 small border-0 mb-3" style="border-radius: 8px;">
              ✅ {{ success }}
            </div>

            <button type="submit" [disabled]="!passwordForm.valid || !passwordsMatch() || loading"
              class="primaryBtn py-2 d-flex align-items-center justify-content-center gap-2"
              style="border-radius: 8px; font-size: 14px;">
              <span *ngIf="loading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
              <span>{{ loading ? 'Updating...' : 'Update Password' }}</span>
            </button>
          </form>
        </div>
      </div>

      <!-- Right Column: Services Setup -->
      <div class="col-md-7">
        <div class="bg-white border rounded-3 p-4 shadow-sm"
          style="border-color: #e2e8f0 !important; border-left: 5px solid #10b981 !important;">
          <h5 class="fw-bold text-dark mb-3" style="font-family: 'Outfit', sans-serif;">Manage Service Items</h5>

          <form [formGroup]="orderForm" (ngSubmit)="additem()" class="mb-4">
            <div class="row g-3 align-items-end">
              <div class="col-md-7">
                <label class="form-label fw-semibold text-secondary">Item Name</label>
                <input formControlName="name" type="text" class="form-control" placeholder="e.g. Silk Saree, Suit"
                  [ngClass]="{'is-invalid': (submit && form['name'].errors) || (form['name'].invalid && (form['name'].dirty || form['name'].touched))}"
                  style="border-radius: 8px; font-size: 14px; padding: 10px 14px;">
                <div
                  *ngIf="(submit && form['name'].errors) || (form['name'].invalid && (form['name'].dirty || form['name'].touched))"
                  class="invalid-feedback">
                  <span *ngIf="form['name'].errors?.['required']">Item name is required</span>
                </div>
              </div>

              <div class="col-md-5">
                <label class="form-label fw-semibold text-secondary">Unit Price (₹)</label>
                <input formControlName="price" type="number" class="form-control" placeholder="Rate"
                  [ngClass]="{'is-invalid': (submit && form['price'].errors) || (form['price'].invalid && (form['price'].dirty || form['price'].touched))}"
                  style="border-radius: 8px; font-size: 14px; padding: 10px 14px;">
                <div
                  *ngIf="(submit && form['price'].errors) || (form['price'].invalid && (form['price'].dirty || form['price'].touched))"
                  class="invalid-feedback">
                  <span *ngIf="form['price'].errors?.['required']">Price is required</span>
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-end mt-3">
              <button type="submit" class="primaryBtn py-2 d-flex align-items-center gap-2" [disabled]="loadingItem"
                style="width: auto; border-radius: 8px; font-size: 14px;">
                <span *ngIf="loadingItem" class="spinner-border spinner-border-sm" role="status"
                  aria-hidden="true"></span>
                <span>{{ loadingItem ? 'Adding...' : '+ Add Product' }}</span>
              </button>
            </div>
          </form>

          <!-- Items Table -->
          <div class="pt-2">
            <div class="table-responsive border rounded-3 mb-3" style="border-color: #e2e8f0 !important;">
              <table class="table align-middle table-hover m-0">
                <thead>
                  <tr>
                    <th class="text-start ps-3">Item Description</th>
                    <th>Price</th>
                    <th class="text-end pe-4">Action</th>
                  </tr>
                </thead>
                <tbody>
                  <tr
                    *ngFor="let order of additems | paginate:{ itemsPerPage: limit, currentPage: page, totalItems:totalItems }; let i=index"
                    class="item-row">
                    <td class="fw-semibold text-dark text-start ps-3">{{ order.name }}</td>
                    <td class="fw-bold text-dark">₹{{ order.price }}</td>
                    <td class="text-end pe-3">
                      <button class="btn btn-outline-danger btn-sm border-0 rounded-circle py-2 px-3"
                        (click)="deleteItem(order._id)" title="Delete Item">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <polyline points="3 6 5 6 21 6" />
                          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                      </button>
                    </td>
                  </tr>
                  <tr *ngIf="additems?.length === 0">
                    <td colspan="3" class="text-center py-4 text-muted">No items configured yet.</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Pagination -->
            <div class="d-flex justify-content-center">
              <pagination-controls (pageChange)="pageChanged($event)" [maxSize]="5" [directionLinks]="true"
                [autoHide]="true">
              </pagination-controls>
            </div>
          </div>

        </div>
      </div>

    </div>

  </div>
</section>
