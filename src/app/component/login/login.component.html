<section class="vh-100 d-flex align-items-center justify-content-center bg-gradient">
  <div class="login-container">
    <div class="login-card shadow-lg rounded-4 overflow-hidden">

      <!-- LEFT SIDE (Branding / Empty) -->
      <div class="login-left d-flex align-items-center justify-content-center">
        <h1 class="brand-text">Laundry Service</h1>
      </div>

      <!-- RIGHT SIDE (Login Form) -->
      <div class="login-form p-5">
        <h2 class="text-center mb-4">Login</h2>

        <form [formGroup]="registerForm" (ngSubmit)="getdata()">

          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" class="form-control" formControlName="name"
              placeholder="Enter username"
              [ngClass]="{'is-invalid': valuename?.invalid && valuename?.touched}" />
            <div *ngIf="valuename?.invalid && valuename?.touched" class="invalid-feedback">
              Username must be at least 3 characters long.
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control" formControlName="password"
              placeholder="Enter password"
              [ngClass]="{'is-invalid': valuepassword?.invalid && valuepassword?.touched}" />
            <div *ngIf="valuepassword?.invalid && valuepassword?.touched" class="invalid-feedback">
              Password must be at least 8 characters long.
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold"
            [disabled]="registerForm.invalid">
            Login
          </button>

          <!-- SIGNUP LINK -->
          <p class="text-center mt-3">
            Don't have an account?
            <a routerLink="/signup" class="text-primary fw-semibold">Sign up</a>
          </p>

        </form>
      </div>

    </div>
  </div>
</section>
